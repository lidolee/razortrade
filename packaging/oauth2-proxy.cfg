# oauth2-proxy config for razortrade dashboard
#
# This file holds only non-sensitive configuration. The Google client
# ID, client secret, and the cookie signing secret live in
# /etc/oauth2-proxy/oauth2-proxy.env (mode 0600 root:oauth2-proxy) and
# are injected as environment variables by systemd — that way the RPM
# and this config can be replaced without ever touching secrets.

# ---- Provider --------------------------------------------------------
provider = "google"
provider_display_name = "Google"

# ---- HTTP listener ---------------------------------------------------
# Listen on loopback. Caddy is the only thing that should ever talk
# to us. If someone hits us directly we'd still work, but with incorrect
# redirect URL construction because reverse_proxy=true is set.
http_address = "127.0.0.1:4180"
reverse_proxy = true

# ---- Callback --------------------------------------------------------
# Must EXACTLY match the "Authorized redirect URI" configured in the
# Google Cloud Console OAuth client. Trailing slash matters.
redirect_url = "https://trader.ghazzo.ch/oauth2/callback"

# ---- Authorisation ---------------------------------------------------
# `email_domains = "*"` means we don't restrict by domain — we restrict
# by explicit allowlist below. Relying on domain alone would let
# anyone with a @ghazzo.ch email sign in, which is too broad.
email_domains = ["*"]
authenticated_emails_file = "/etc/oauth2-proxy/allowed_emails"

# ---- Paths -----------------------------------------------------------
# All oauth2-proxy endpoints live under /oauth2/*, matching the
# Caddyfile handle block.
proxy_prefix = "/oauth2"

# Caddy's forward_auth hits /oauth2/auth. That endpoint returns:
#   202 Accepted if the request's cookie is a valid oauth2-proxy session
#   401 Unauthorized otherwise
# Caddy then either proxies to the dashboard or redirects to /oauth2/sign_in.

# ---- Session cookie --------------------------------------------------
# Cookie expires after 7 days of inactivity. Yubikey + Google 2FA gate
# the issuance; once issued we don't want to force re-auth on every visit.
cookie_expire = "168h"
cookie_refresh = "1h"
cookie_name = "_oauth2_proxy_razortrade"
cookie_domains = ["trader.ghazzo.ch"]
cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"

# ---- Pass-through headers to the dashboard ---------------------------
# Lets the dashboard log who viewed what. Headers are set by oauth2-proxy
# after a successful /oauth2/auth call; Caddy copies them onto the
# upstream request.
set_xauthrequest = true
pass_user_headers = true
pass_access_token = false
pass_authorization_header = false

# ---- Sign-out --------------------------------------------------------
# Hitting /oauth2/sign_out clears the session cookie. We don't
# configure Google-side revocation — that requires admin scope and
# isn't worth the extra consent-screen surface area.

# ---- Error pages -----------------------------------------------------
# Default oauth2-proxy error pages are plain but functional. No
# customisation.

# ---- Logging ---------------------------------------------------------
# Standard format, journal-friendly.
standard_logging = true
request_logging = true
auth_logging = true
silence_ping_logging = true
