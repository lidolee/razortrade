#cloud-config
# =============================================================================
# razortrade Hetzner Rocky 10 first-boot provisioning
# =============================================================================
#
# BEFORE USING:
# 1. Replace ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK0xKP4tgrY6w/C5rOzSIr2KPl6vMFVYE4kWRougIoqU walid@victus below with the output of:
#      cat ~/.ssh/id_ed25519.pub
#    (on your ThinkPad or ThinkStation)
# 2. Paste this whole file into "User Data" when creating the server in
#    the Hetzner Cloud Console.
# 3. First boot takes 2-4 minutes while cloud-init runs. Watch progress with:
#      ssh linda@<server-ip> sudo tail -f /var/log/cloud-init-output.log
#
# WHAT THIS DOES:
# - Creates user `linda` with SSH key access and passwordless sudo
# - Disables root login and password SSH
# - Enables firewalld with only port 22 open (dashboard uses SSH tunnel)
# - Enables fail2ban for SSH brute-force protection
# - Enables automatic security updates (dnf-automatic)
# - Sets timezone to Europe/Zurich
# - Installs basic tools (vim, htop, sqlite, tmux)
# =============================================================================

timezone: Europe/Zurich
hostname: razortrade-prod
fqdn: razortrade-prod.local

ssh_pwauth: false
disable_root: true

users:
  - name: linda
    groups: [wheel]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK0xKP4tgrY6w/C5rOzSIr2KPl6vMFVYE4kWRougIoqU walid@victus

# Package management
package_update: true
package_upgrade: true
packages:
  - fail2ban
  - firewalld
  - dnf-automatic
  - vim-enhanced
  - htop
  - tmux
  - sqlite
  - jq
  - curl
  - bind-utils
  - tar

write_files:
  - path: /etc/fail2ban/jail.local
    permissions: "0644"
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 3
      backend = systemd

      [sshd]
      enabled = true

  - path: /etc/dnf/automatic.conf.d/razortrade.conf
    permissions: "0644"
    content: |
      # Override default config for security-only automatic updates.
      # The kernel-update-and-reboot cycle stays manual; this is just
      # to keep openssl / systemd / etc. patched.

runcmd:
  # SSH hardening (cloud-init sets ssh_pwauth but we force it and
  # also kill root login for paranoia)
  - |
    sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
    sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
    sed -i 's/^#\?ChallengeResponseAuthentication.*/ChallengeResponseAuthentication no/' /etc/ssh/sshd_config
    sed -i 's/^#\?PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
    systemctl reload sshd

  # Firewall: only SSH in, everything else blocked. The dashboard on
  # localhost:8080 will be reached via SSH tunnel.
  - systemctl enable --now firewalld
  - firewall-cmd --permanent --remove-service=cockpit || true
  - firewall-cmd --permanent --add-service=ssh
  - firewall-cmd --permanent --set-default-zone=public
  - firewall-cmd --reload

  # fail2ban
  - systemctl enable --now fail2ban

  # Automatic security updates
  - sed -i 's/^upgrade_type.*/upgrade_type = security/' /etc/dnf/automatic.conf
  - sed -i 's/^apply_updates.*/apply_updates = yes/' /etc/dnf/automatic.conf
  - sed -i 's/^emit_via.*/emit_via = stdio/' /etc/dnf/automatic.conf
  - systemctl enable --now dnf-automatic.timer

  # Friendly login banner showing what this host is
  - |
    cat > /etc/motd <<'EOF'
    =========================================
    razortrade production host (Rocky 10)
    =========================================
    - Logs:       journalctl -u rt-daemon -f
    - Config:     /etc/razortrade/daemon.toml
    - Database:   /var/lib/razortrade/razortrade.sqlite
    - Dashboard:  ssh -L 8080:localhost:8080 linda@$(hostname -I | awk '{print $1}')
                  then http://localhost:8080

    EOF

final_message: "razortrade host provisioned in $UPTIME seconds. You can now SSH in as linda."
